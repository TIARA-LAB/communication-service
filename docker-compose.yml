services:
  api:
    build: .
    container_name: nexus_api
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - nexus_net

  db:
    image: mysql:8.0
    container_name: nexus_db
    restart: always
    environment:
      # Use the variables from .env to keep it in sync
      MYSQL_ROOT_PASSWORD: communication
      MYSQL_DATABASE: communication_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nexus_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"
    networks:
      - nexus_net

networks:
  nexus_net:
    driver: bridge

volumes:
  mysql_data:
