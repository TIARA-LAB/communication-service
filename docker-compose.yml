version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: comms_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: comms_engine
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: comms_api
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 3306
    depends_on:
      - db

volumes:
  mysql_data: