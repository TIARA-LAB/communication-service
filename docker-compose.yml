services:
  api:
    build: .
    container_name: nexus_api
    ports:
      - '3000:3000'
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - nexus_net

  db:
    image: postgres:13
    container_name: nexus_db
    restart: always
    environment:
      POSTGRES_DB: communication_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: communication
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d communication_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: nexus_redis
    ports:
      - '6379:6379'
    networks:
      - nexus_net

networks:
  nexus_net:
    driver: bridge

volumes:
  postgres_data:
